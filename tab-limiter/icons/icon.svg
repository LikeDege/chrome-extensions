<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Stacked tab shapes -->
  <rect x="22" y="36" width="60" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="18" y="48" width="68" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="14" y="60" width="76" height="40" rx="6" fill="#fff" fill-opacity="0.95"/>
  <!-- Scissors / cut symbol -->
  <g stroke="#6366f1" stroke-width="4.5" stroke-linecap="round" fill="none">
    <line x1="72" y1="68" x2="106" y2="98"/>
    <line x1="106" y1="68" x2="72" y2="98"/>
  </g>
</svg>
